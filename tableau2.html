<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau des mois</title>

<style>
table{
    width:800px;
    border-collapse:collapse;
    margin:auto;
}

th, td{
    border:1px solid black;
    text-align:center;
    vertical-align:middle;
    padding:10px;
}

th{
    font-size:22px;
    font-weight:bold;
}

.haut{
    height:140px;
}

.bas{
    height:100px;
}

.italique{
    font-style:italic;
}
</style>

</head>
<body>

<table>
    <tr>
        <th>Janvier</th>
        <th>Février</th>
        <th>Mars</th>
    </tr>

    <tr class="haut">
        <td>
            Après d'agréables<br>
            vacances<br>
            de nouveau<br>
            au travail ...
        </td>

        <td>
            Dans 2<br>
            semaines<br><br>
            les vacances !
        </td>

        <td>
            Déjà le<br>
            conseil<br>
            de classe
        </td>
    </tr>

    <tr class="bas">
        <td class="italique">
            Il neige<br>
            déjà
        </td>

        <td>
            Il fait très<br>
            froid<br>
            depuis<br>
            10 jours
        </td>

        <td>
            Encore<br>
            de la pluie...
        </td>
    </tr>
</table>

</body>
</html>
