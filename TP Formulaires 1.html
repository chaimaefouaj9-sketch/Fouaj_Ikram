<!DOCTYPE html>
<html>
<head>
    <title>EXEMPLE DE FORMULAIRES</title>
</head>
<body>
    <form action="mailto:mfagroud@yahoo.com" method="post">
        <fieldset id="coord">
            <legend>Coordonnées personnelles</legend>
            <table>
                <tr>
                    <td>Civilité :</td>
                    <td>
                        <input type="radio" name="civilite" value="M."/> M.
                        <input type="radio" name="civilite" value="Mlle"/> Mlle
                        <input type="radio" name="civilite" value="Mme"/> Mme
                    </td>
                </tr>
                <tr>
                    <td>Nom :</td>
                    <td><input type="text" name="nom" size="30"/></td>
                </tr>
                <tr>
                    <td>Adresse :</td>
                    <td><input type="text" name="ville" size="30"/></td>
                </tr>
                <tr>
                    <td>Pays :</td>
                    <td>
                        <select name="pays">
                            <option value="france">France</option>
                            <option value="belgique">Belgique</option>
                            <option value="suisse">Suisse</option>
                        </select>
                    </td>
                </tr>
            </table>
        </fieldset>

        <fieldset id="interets">
            <legend>Centres d’intérêts</legend>
            <input type="checkbox" name="interets1" value="sport"/> Sport
            <input type="checkbox" name="interets2" value="cinema"/> Cinéma
            <input type="checkbox" name="interets3" value="internet"/> Internet
            <input type="checkbox" name="interets4" value="voyages"/> Voyages
        </fieldset>

        <fieldset id="message">
            <legend>Message</legend>
            <textarea name="comments" rows="5" cols="40"></textarea>
        </fieldset>

        <input type="submit" value="Envoyer"/>
        <input type="reset" value="Recommencer"/>
    </form>
</body>
</html>
