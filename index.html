<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exercice Partie 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Exemple de page HTML avec styles</h1>

  <!-- Division principale -->
  <div class="division">
    <p>Texte aligné à gauche dans une division occupant 25% de la hauteur de la page.</p>
  </div>

  <!-- Divisions avec styles différents -->
  <div id="ele1">Division de type 1</div>
  <div id="ele2">Division de type 2</div>

  <!-- Exemple de classe appliquée à différents éléments -->
  <p class="special">Texte stylisé avec la classe spéciale.</p>
  <table class="special" border="1">
    <tr><th>Nom</th><th>Valeur</th></tr>
    <tr><td>Exemple</td><td>123</td></tr>
  </table>

  <!-- Exemple de positionnement absolu -->
  <div class="positionnee">Bloc positionné absolument</div>

</body>
</html>
